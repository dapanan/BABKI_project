<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COINS</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #222;
            overflow: hidden; /* Запрещаем скролл страницы */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            touch-action: none; /* Отключаем стандартные жесты браузера */
        }
        /* Канвас должен растягиваться на весь экран */
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
    <!-- Подключаем SDK Яндекса -->
    <script src="https://yandex.ru/games/sdk/v2"></script>
</head>
<body>
    <!-- Канвас для игры (Pygbag будет использовать его) -->
    <canvas id="canvas"></canvas>

    <!-- Скрипт инициализации Яндекса и рекламы -->
    <script>
        // 1. Глобальные переменные для связи Python <--> JS
        window.last_reward_success = false;
        window.ad_is_open = false; // Флаг: открыта ли реклама сейчас

        // 2. Инициализируем SDK
        YaGames.init().then(ysdk => {
            console.log("Yandex SDK initialized");
            window.ysdk = ysdk;

            // Передаем язык в Python (дожидаемся загрузки Pyodide)
            var lang = ysdk.environment.i18n.tld === 'ru' ? 'ru' : 'en';
            waitForPyodide(lang);

            // === ВКЛЮЧАЕМ БАННЕР СРАЗУ (по желанию) ===
            showBanner();

        }).catch(err => {
            console.error("Yandex SDK init error:", err);
            waitForPyodide('ru');
        });

        function waitForPyodide(lang) {
            let interval = setInterval(() => {
                // Pyodide доступен через window.pyodide после загрузки
                if (window.pyodide && window.pyodide.runPython) {
                    clearInterval(interval);
                    try {
                        window.pyodide.runPython(`
import localization
import yandex_helper
localization.current_lang = "${lang}"
print(f"Language set to: ${lang}")
                        `);
                    } catch(e) { console.log("Python lang sync error", e); }
                }
            }, 100);
        }

        // === ФУНКЦИИ РЕКЛАМЫ ===

        // 1. БАННЕРНАЯ РЕКЛАМА
        function showBanner() {
            if (!window.ysdk) return;
            window.ysdk.adv.showBannerAdv();
            console.log("Banner Ad requested");
        }

        // 2. МЕЖСТРАНИЧНАЯ РЕКЛАМА (Interstitial)
        function showInterstitial() {
            if (!window.ysdk) return;
            if (window.ad_is_open) return;

            console.log("Requesting Interstitial Ad...");
            window.ysdk.adv.showFullscreenAdv({
                callbacks: {
                    onOpen: () => {
                        window.ad_is_open = true;
                        console.log("Interstitial opened");
                        if(window.pyodide) window.pyodide.runPython('yandex_helper.on_ad_opened()');
                    },
                    onClose: (wasShown) => {
                        window.ad_is_open = false;
                        console.log("Interstitial closed");
                        if(window.pyodide) window.pyodide.runPython('yandex_helper.on_ad_closed()');
                    },
                    onError: (e) => {
                        window.ad_is_open = false;
                        console.log("Interstitial error", e);
                        if(window.pyodide) window.pyodide.runPython('yandex_helper.on_ad_closed()');
                    }
                }
            });
        }

        // 3. РЕКЛАМА ЗА ВОЗНАГРАЖДЕНИЕ (Rewarded Video)
        function showRewardedVideo() {
            if (!window.ysdk) return;

            console.log("Requesting Rewarded Video...");
            window.ysdk.adv.showRewardedVideo({
                callbacks: {
                    onOpen: () => {
                        window.ad_is_open = true;
                        if(window.pyodide) window.pyodide.runPython('yandex_helper.on_ad_opened()');
                    },
                    onRewarded: () => {
                        console.log("Reward Granted!");
                        window.last_reward_success = true;
                    },
                    onClose: () => {
                        window.ad_is_open = false;
                        if(window.pyodide) window.pyodide.runPython('yandex_helper.on_ad_closed()');
                    },
                    onError: (e) => {
                        window.ad_is_open = false;
                        console.log("Rewarded error", e);
                        if(window.pyodide) window.pyodide.runPython('yandex_helper.on_ad_closed()');
                    }
                }
            });
        }

        // Функция проверки тачскрина
        window.hasTouchScreen = function() {
            return ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        };
    </script>

    <!--
       Загрузка Pyodide и самого приложения.
       Pygbag при сборке создаст файлы pygame.js и main.js.
       Мы загружаем runtime, а потом точку входа.
    -->
    <script src="pygame.js"></script>
    <script src="main.js"></script>
</body>
</html>
